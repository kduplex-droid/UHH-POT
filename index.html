<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHH Click Guess Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>UHH Click Guess Game</h1>
    <p class="subtitle">Guess today's clicks. Closest guess wins.</p>

    <div class="box">

        <h2>Today's Clicker</h2>

        <p><strong>Day:</strong> <span id="dayName"></span></p>
        <p><strong>Date:</strong> <span id="todayDate"></span></p>
        <p id="guessStatus">Guesses are open</p>

        <div class="pot-area" id="potArea">

            <button id="potButton" onclick="addClick()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Clay_pot.jpg"
                     id="pot"
                     alt="Pot">
                <div class="pot-icon">🖱</div>
            </button>

        </div>

        <p><strong>Today's Clicks:</strong> <span id="todayCount">0</span></p>

    </div>

    <div class="box">

        <h2>Enter a Guess</h2>

        <select id="playerName">
            <option value="">Choose player</option>
            <option value="William">William</option>
            <option value="Rylan">Rylan</option>
            <option value="Nickeel">Nickeel</option>
            <option value="Kgothatso">Kgothatso</option>
        </select>

        <input type="number" id="playerGuess" placeholder="Enter your guess">
        <button onclick="saveGuess()">Save Guess</button>

        <h3>Today's Guesses</h3>
        <ul id="guessList"></ul>

    </div>

    <div class="box">
        <h2>Daily Results</h2>
        <ul id="dailyResults"></ul>
    </div>

    <div class="box">
        <h2>Top 4 Leaderboard</h2>
        <ol id="leaderboard"></ol>
    </div>

    <div id="adminCorner" onclick="openResetPrompt()" title="Admin"></div>
    <audio id="clickSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b3c42.mp3?filename=click-124467.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>

</body>
</html>
